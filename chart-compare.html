<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PEVcast Chart Compare</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highcharts@11.4.1/highcharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega@5.28.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.18.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.25.0"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #172033;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --border: #374151;
      --temp: #f97316;
      --prob: #38bdf8;
      --rain: #10b981;
      --accent: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1rem;
      background: rgba(17, 24, 39, 0.96);
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 1.2rem; }
    .subhead { margin-top: 0.15rem; color: var(--muted); font-size: 0.85rem; }
    button, a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      background: #111827;
      color: var(--fg);
      text-decoration: none;
      cursor: pointer;
      font: inherit;
      font-size: 0.9rem;
    }
    main { padding: 1rem; }
    .empty {
      max-width: 680px;
      margin: 12vh auto 0;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--panel);
    }
    .overview {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .metric {
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--panel);
    }
    .metric span { display: block; color: var(--muted); font-size: 0.78rem; }
    .metric strong { display: block; margin-top: 0.15rem; font-size: 1.05rem; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 0.75rem;
      height: 0.75rem;
      margin-right: 0.35rem;
      border-radius: 999px;
      vertical-align: -0.08rem;
      background: currentColor;
    }
    .legend .temp { color: var(--temp); }
    .legend .prob { color: var(--prob); }
    .legend .rain { color: var(--rain); }
    .range-controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 0 0 1rem;
    }
    .range-controls button {
      min-width: 64px;
      font-weight: 600;
    }
    .range-controls button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #04130e;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }
    .engine {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--panel);
      overflow: hidden;
    }
    .engine-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.75rem 0.85rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .engine h2 { margin: 0; font-size: 1rem; }
    .engine small { color: var(--muted); }
    .chart-host {
      position: relative;
      height: 320px;
      padding: 0.5rem;
      background: #0f172a;
    }
    .chart-host canvas, .chart-host svg {
      display: block;
      position: relative;
      z-index: 2;
    }
    .temp-axis-gradient {
      position: absolute;
      top: 34px;
      bottom: 54px;
      left: 8px;
      width: 38px;
      border-radius: 0.2rem;
      opacity: 0.95;
      pointer-events: none;
      z-index: 1;
    }
    #vg-tooltip-element {
      background: #111827;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      color: var(--fg);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      font-family: inherit;
      font-size: 0.8rem;
    }
    #vg-tooltip-element table {
      color: inherit;
    }
    #vg-tooltip-element td.key {
      color: var(--muted);
    }
    .notes {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
    }
    .notes div { color: var(--muted); }
    .notes strong { display: block; margin-bottom: 0.15rem; color: var(--fg); font-size: 0.76rem; }
    .error {
      padding: 0.75rem;
      color: #fecaca;
      font-size: 0.86rem;
    }
    @media (max-width: 980px) {
      .grid, .overview { grid-template-columns: 1fr; }
      .notes { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      header { position: static; align-items: flex-start; flex-direction: column; }
      main { padding: 0.75rem; }
      .chart-host { height: 280px; }
      .notes { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Chart Engine Comparison</h1>
      <div id="pageSubtitle" class="subhead">Loading forecast dataset...</div>
    </div>
    <a class="button" href="index.html">Back to PEVcast</a>
  </header>

  <main id="content"></main>

  <script type="module">

    let React;
    let createRoot;
    let Area;
    let Bar;
    let CartesianGrid;
    let ComposedChart;
    let Line;
    let ReferenceLine;
    let ResponsiveContainer;
    let Tooltip;
    let XAxis;
    let YAxis;
    let ResponsiveLine;
    let fullRows = [];
    let currentRangeHours = 24;
    let reactEnginesLoaded = false;
    const reactRootMap = new WeakMap();
    const STORAGE_KEY = 'PEVcast.chartCompare.dataset';
    const content = document.getElementById('content');
    const subtitle = document.getElementById('pageSubtitle');
    const colors = {
      temp: '#f97316',
      tempCold: '#005eff',
      tempCool: '#4fd9e6',
      tempWarm: '#ffd400',
      tempHot: '#ff2b2b',
      prob: '#38bdf8',
      rain: '#10b981',
      cursor: 'rgba(234,179,8,0.92)',
      grid: 'rgba(148, 163, 184, 0.22)',
      text: '#d1d5db'
    };
    const tempAnchors = [
      { t: -4, c: '#000000' },
      { t: 5, c: '#3a3a3a' },
      { t: 14, c: '#2b2f83' },
      { t: 23, c: '#0033cc' },
      { t: 32, c: '#005eff' },
      { t: 41, c: '#3f7fff' },
      { t: 50, c: '#8cc6ff' },
      { t: 59, c: '#4fd9e6' },
      { t: 68, c: '#2e8b57' },
      { t: 77, c: '#9acd32' },
      { t: 86, c: '#ffd400' },
      { t: 95, c: '#ff7f00' },
      { t: 104, c: '#ff2b2b' }
    ];
    const selectedIndices = {};

    function tempColor(value) {
      const t = Number(value);
      if (!Number.isFinite(t)) return colors.temp;
      if (t <= tempAnchors[0].t) return tempAnchors[0].c;
      if (t >= tempAnchors[tempAnchors.length - 1].t) return tempAnchors[tempAnchors.length - 1].c;
      for (let i = 0; i < tempAnchors.length - 1; i++) {
        const a = tempAnchors[i];
        const b = tempAnchors[i + 1];
        if (t >= a.t && t <= b.t) {
          const p = (t - a.t) / ((b.t - a.t) || 1);
          return lerpHex(a.c, b.c, p);
        }
      }
      return colors.temp;
    }

    function lerpHex(aHex, bHex, t) {
      const a = parseInt(aHex.slice(1), 16);
      const b = parseInt(bHex.slice(1), 16);
      const ar = (a >> 16) & 255;
      const ag = (a >> 8) & 255;
      const ab = a & 255;
      const br = (b >> 16) & 255;
      const bg = (b >> 8) & 255;
      const bb = b & 255;
      const h = value => Math.round(value).toString(16).padStart(2, '0');
      return `#${h(ar + (br - ar) * t)}${h(ag + (bg - ag) * t)}${h(ab + (bb - ab) * t)}`;
    }

    function tempColorStops(minTemp, maxTemp) {
      const lo = Number.isFinite(minTemp) ? minTemp : tempAnchors[0].t;
      const hi = Number.isFinite(maxTemp) && maxTemp > lo ? maxTemp : lo + 1;
      const anchors = [
        { t: lo, c: tempColor(lo) },
        ...tempAnchors.filter(anchor => anchor.t > lo && anchor.t < hi),
        { t: hi, c: tempColor(hi) }
      ].sort((a, b) => a.t - b.t);
      return anchors.map(anchor => [Math.max(0, Math.min(1, (anchor.t - lo) / (hi - lo))), anchor.c]);
    }

    function tempDomain(rows) {
      const values = rows.map(row => row.temperatureF).filter(Number.isFinite);
      return values.length ? [Math.min(...values), Math.max(...values)] : [0, 100];
    }

    function nearestRowIndex(rows, fraction) {
      return Math.max(0, Math.min(rows.length - 1, Math.round(fraction * Math.max(0, rows.length - 1))));
    }

    function selectedIndex(hostId, rows) {
      const index = selectedIndices[hostId];
      return Number.isInteger(index) ? Math.max(0, Math.min(rows.length - 1, index)) : null;
    }

    function selectedXKey(hostId, rows) {
      const index = selectedIndex(hostId, rows);
      return index == null ? null : rows[index]?.xKey;
    }

    function addSvgGradient(svg, id, minTemp, maxTemp) {
      const defs = svg.append('defs');
      const gradient = defs.append('linearGradient').attr('id', id).attr('x1', '0%').attr('x2', '0%').attr('y1', '100%').attr('y2', '0%');
      tempColorStops(minTemp, maxTemp).forEach(([offset, color]) => {
        gradient.append('stop').attr('offset', `${offset * 100}%`).attr('stop-color', color);
      });
      return `url(#${id})`;
    }

    function addD3TempAxisGradient(svg, g, gradientId, yScale, innerH) {
      g.insert('rect', ':first-child')
        .attr('x', -44)
        .attr('y', 0)
        .attr('width', 38)
        .attr('height', innerH)
        .attr('fill', `url(#${gradientId})`)
        .attr('opacity', 0.95);
      g.selectAll('.y-temp-axis text').attr('fill', '#ffffff').attr('font-weight', 700);
      g.selectAll('.y-temp-axis .domain,.y-temp-axis .tick line').attr('stroke', 'rgba(255,255,255,0.32)');
    }

    function addD3Selection(hostId, rows, g, innerW, innerH, xForIndex, rerender) {
      const current = selectedIndex(hostId, rows);
      if (current != null) {
        const x = xForIndex(current);
        g.append('line')
          .attr('x1', x)
          .attr('x2', x)
          .attr('y1', 0)
          .attr('y2', innerH)
          .attr('stroke', colors.cursor)
          .attr('stroke-width', 2.5)
          .attr('stroke-dasharray', '4 3')
          .attr('pointer-events', 'none');
      }
      g.append('rect')
        .attr('x', 0)
        .attr('y', 0)
        .attr('width', innerW)
        .attr('height', innerH)
        .attr('fill', 'transparent')
        .style('cursor', 'crosshair')
        .on('click', event => {
          const [x] = d3.pointer(event);
          selectedIndices[hostId] = nearestRowIndex(rows, x / Math.max(1, innerW));
          rerender(rows);
        });
    }

    function gradientCss(rows) {
      const [minTemp, maxTemp] = tempDomain(rows);
      return `linear-gradient(to top, ${tempColorStops(minTemp, maxTemp).map(([offset, color]) => `${color} ${offset * 100}%`).join(', ')})`;
    }

    function ensureHostAxisGradient(hostId, rows) {
      const host = document.getElementById(hostId);
      if (!host) return;
      let gradient = host.querySelector('.temp-axis-gradient');
      if (!gradient) {
        gradient = document.createElement('div');
        gradient.className = 'temp-axis-gradient';
        host.prepend(gradient);
      }
      gradient.style.background = gradientCss(rows);
    }

    function readDataset() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function fmtTime(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString([], { weekday: 'short', hour: 'numeric' });
    }

    function prepareRows(payload) {
      return payload.hourly.map((h, index) => ({
        index,
        xKey: `${String(index).padStart(4, '0')}|${fmtTime(h.time)}`,
        time: h.time,
        label: fmtTime(h.time),
        temperatureF: Number.isFinite(Number(h.temperatureF)) ? Number(h.temperatureF) : null,
        precipProb: Number.isFinite(Number(h.precipProb)) ? Number(h.precipProb) : 0,
        rainMm: Number.isFinite(Number(h.rainMm)) ? Number(h.rainMm) : 0
      }));
    }

    function range(rows, key, fallback) {
      const values = rows.map(r => r[key]).filter(v => Number.isFinite(v));
      return values.length ? [Math.min(...values), Math.max(...values)] : fallback;
    }

    function showEmpty() {
      subtitle.textContent = 'No forecast handoff was found for this browser session.';
      content.innerHTML = `
        <section class="empty">
          <h2>No chart data available</h2>
          <p>Open the main PEVcast page, wait for a forecast to load, then use the Chart Compare button.</p>
          <a class="button" href="index.html">Back to PEVcast</a>
        </section>
      `;
    }

    function engineShell(engine) {
      const article = document.createElement('article');
      article.className = 'engine';
      article.innerHTML = `
        <div class="engine-header">
          <h2>${engine.name}</h2>
          <small>${engine.kind}</small>
        </div>
        <div id="${engine.id}" class="chart-host"></div>
        <div class="notes">
          <div><strong>Rendering</strong>${engine.rendering}</div>
          <div><strong>API</strong>${engine.api}</div>
          <div><strong>Complexity</strong>${engine.complexity}</div>
          <div><strong>Static CDN</strong>${engine.staticUse}</div>
        </div>
      `;
      return article;
    }

    function mountPage(payload, rows) {
      const generated = payload.generatedAt ? new Date(payload.generatedAt).toLocaleString() : 'unknown';
      const [tempMin, tempMax] = range(rows, 'temperatureF', [0, 0]);
      const totalRain = rows.reduce((sum, row) => sum + row.rainMm, 0);
      const maxProb = Math.max(...rows.map(row => row.precipProb), 0);

      subtitle.textContent = `${payload.cityName || 'Current forecast'} | ${rows.length} hourly points | generated ${generated}`;
      content.innerHTML = `
        <section class="overview">
          <div class="metric"><span>Temperature range</span><strong>${tempMin.toFixed(1)}-${tempMax.toFixed(1)}&deg;F</strong></div>
          <div class="metric"><span>Max precipitation chance</span><strong>${maxProb.toFixed(0)}%</strong></div>
          <div class="metric"><span>Total rain accumulation</span><strong>${totalRain.toFixed(1)} mm</strong></div>
          <div class="metric"><span>Location</span><strong>${payload.latitude?.toFixed?.(3) || 'n/a'}, ${payload.longitude?.toFixed?.(3) || 'n/a'}</strong></div>
        </section>
        <div class="range-controls" aria-label="Chart range">
          <button type="button" data-range-hours="24">24h</button>
          <button type="button" data-range-hours="72">72h</button>
          <button type="button" data-range-hours="168">7d</button>
        </div>
        <section id="engineGrid" class="grid"></section>
      `;

      const engines = [
        { id: 'chartjsHost', name: 'Chart.js', kind: 'Canvas', rendering: 'Crisp, familiar mixed line/bar output.', api: 'Straightforward dataset config.', complexity: 'Low for this use case.', staticUse: 'Excellent UMD CDN fit.' },
        { id: 'echartsHost', name: 'Apache ECharts', kind: 'Canvas', rendering: 'Polished defaults and strong interaction.', api: 'Option object is broad but readable.', complexity: 'Moderate because config is dense.', staticUse: 'Excellent UMD CDN fit.' },
        { id: 'highchartsHost', name: 'Highcharts', kind: 'SVG', rendering: 'Very refined labels and hover behavior.', api: 'Declarative series and axes.', complexity: 'Low, with license review for production.', staticUse: 'Excellent CDN fit.' },
        { id: 'd3Host', name: 'D3.js', kind: 'SVG', rendering: 'Maximum control over every mark.', api: 'Imperative and lower level.', complexity: 'Highest because axes/marks are manual.', staticUse: 'Excellent CDN fit.' },
        { id: 'vegaHost', name: 'Vega-Lite', kind: 'SVG', rendering: 'Clean grammar-driven output.', api: 'Concise visual specification.', complexity: 'Moderate while layering encodings.', staticUse: 'Good with Vega dependencies.' },
        { id: 'rechartsHost', name: 'Recharts', kind: 'React SVG', rendering: 'Readable React component composition.', api: 'Natural for React apps.', complexity: 'Moderate in static HTML due to module imports.', staticUse: 'Works through ESM CDN.' },
        { id: 'nivoHost', name: 'Nivo', kind: 'React SVG', rendering: 'Modern styling and responsive behavior.', api: 'Expressive but expects Nivo data shapes.', complexity: 'Moderate-high outside a bundled React app.', staticUse: 'Works through ESM CDN.' }
      ];

      const grid = document.getElementById('engineGrid');
      engines.forEach(engine => grid.appendChild(engineShell(engine)));
    }

    function sliceRows(hours) {
      return fullRows.slice(0, Math.min(hours, fullRows.length));
    }

    function updateRangeButtons() {
      document.querySelectorAll('[data-range-hours]').forEach(button => {
        const hours = Number(button.dataset.rangeHours);
        button.classList.toggle('active', hours === currentRangeHours);
        button.disabled = fullRows.length < hours;
        button.title = button.disabled ? `Only ${fullRows.length} hourly points are available` : '';
      });
    }

    async function renderAll(payload, rows) {
      mountPage(payload, rows);
      updateRangeButtons();
      document.querySelectorAll('[data-range-hours]').forEach(button => {
        button.addEventListener('click', async () => {
          const hours = Number(button.dataset.rangeHours);
          if (!hours || hours === currentRangeHours) return;
          currentRangeHours = hours;
          await renderAll(payload, sliceRows(currentRangeHours));
        });
      });
      safeRender('chartjsHost', renderChartJs, rows);
      safeRender('echartsHost', renderECharts, rows);
      safeRender('highchartsHost', renderHighcharts, rows);
      safeRender('d3Host', renderD3, rows);
      safeRender('vegaHost', renderVegaLite, rows);
      try {
        if (!reactEnginesLoaded) {
          await loadReactEngines();
          reactEnginesLoaded = true;
        }
        safeRender('rechartsHost', renderRecharts, rows);
        safeRender('nivoHost', renderNivo, rows);
      } catch (error) {
        console.error('[Chart Compare] React chart engines failed', error);
        document.getElementById('rechartsHost').innerHTML = '<div class="error">Recharts could not load from the ESM CDN.</div>';
        document.getElementById('nivoHost').innerHTML = '<div class="error">Nivo could not load from the ESM CDN.</div>';
      }
    }

    function commonAxisOptions() {
      return {
        color: colors.text,
        grid: { color: colors.grid }
      };
    }

    const chartJsComparePlugin = {
      id: 'chartCompareGradientAndSelection',
      beforeDatasetsDraw(chart, _args, opts) {
        const area = chart.chartArea;
        const y = chart.scales.temp;
        if (!area || !y) return;
        const ctx = chart.ctx;
        const gradient = ctx.createLinearGradient(0, area.top, 0, area.bottom);
        tempColorStops(y.min, y.max).forEach(([offset, color]) => gradient.addColorStop(1 - offset, color));
        ctx.save();
        ctx.globalAlpha = 0.95;
        ctx.fillStyle = gradient;
        ctx.fillRect(y.left, area.top, Math.min(42, y.width), area.bottom - area.top);
        ctx.restore();
      },
      afterDraw(chart, _args, opts) {
        const area = chart.chartArea;
        const x = chart.scales.x;
        if (!area || !x || !opts?.rows || !opts?.hostId) return;
        const index = selectedIndex(opts.hostId, opts.rows);
        if (index == null) return;
        const px = x.getPixelForValue(opts.rows[index].label);
        const ctx = chart.ctx;
        ctx.save();
        ctx.strokeStyle = colors.cursor;
        ctx.lineWidth = 2.5;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(px, area.top);
        ctx.lineTo(px, area.bottom);
        ctx.stroke();
        ctx.restore();
      }
    };
    Chart.register(chartJsComparePlugin);

    function renderChartJs(rows) {
      const host = document.getElementById('chartjsHost');
      host.innerHTML = '<canvas aria-label="Chart.js weather comparison"></canvas>';
      ensureHostAxisGradient('chartjsHost', rows);
      const chart = new Chart(host.querySelector('canvas'), {
        data: {
          labels: rows.map(r => r.label),
          datasets: [
            { type: 'bar', label: 'Rain mm', data: rows.map(r => r.rainMm), yAxisID: 'rain', backgroundColor: 'rgba(16,185,129,0.55)', borderColor: colors.rain },
            { type: 'line', label: 'Temp F', data: rows.map(r => r.temperatureF), yAxisID: 'temp', borderColor: colors.temp, backgroundColor: colors.temp, pointRadius: 0, tension: 0.25, segment: { borderColor: ctx => tempColor(ctx.p1.parsed.y) } },
            { type: 'line', label: 'Precip %', data: rows.map(r => r.precipProb), yAxisID: 'prob', borderColor: colors.prob, backgroundColor: 'rgba(56,189,248,0.16)', pointRadius: 0, tension: 0.25, fill: true }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          onClick: (event, _elements, chart) => {
            const canvas = chart.canvas;
            const rect = canvas.getBoundingClientRect();
            const fraction = (event.native.clientX - rect.left - chart.chartArea.left) / Math.max(1, chart.chartArea.right - chart.chartArea.left);
            selectedIndices.chartjsHost = nearestRowIndex(rows, fraction);
            chart.update('none');
          },
          plugins: {
            legend: { display: false },
            chartCompareGradientAndSelection: { hostId: 'chartjsHost', rows }
          },
          scales: {
            x: { ticks: { color: colors.text, maxTicksLimit: 8 }, grid: { color: colors.grid } },
            temp: { type: 'linear', position: 'left', ticks: commonAxisOptions(), grid: { color: colors.grid } },

        const index = selectedIndex('nivoHost', rows);
        if (index == null) return null;
        const x = xScale(rows[index].xKey);
        if (x == null) return null;
        return React.createElement('line', { key: 'selection-line', x1: x, x2: x, y1: 0, y2: innerHeight, stroke: colors.cursor, strokeWidth: 2.5, strokeDasharray: '4 3' });
      };
      const clickLayer = ({ innerWidth, innerHeight }) => React.createElement('rect', {
        key: 'click-layer',
        x: 0,
        y: 0,
        width: innerWidth,
        height: innerHeight,
        fill: 'transparent',
        style: { cursor: 'crosshair' },
        onClick: event => {
          const rect = event.currentTarget.getBoundingClientRect();
          selectedIndices.nivoHost = nearestRowIndex(rows, (event.clientX - rect.left) / Math.max(1, rect.width));
          renderNivo(rows);
        }
      });
      renderReactRoot('nivoHost', React.createElement(ResponsiveLine, {
        data,
        margin: { top: 26, right: 24, bottom: 54, left: 46 },
        xScale: { type: 'point' },
        yScale: { type: 'linear', min: 'auto', max: 'auto', stacked: false },
        curve: 'linear',
        colors: series => series.id === 'Temp F' ? 'url(#nivoTempLineGradient)' : series.color,
        pointSize: 0,
        enableGridX: false,
        layers: [gradientLayer, 'grid', 'markers', 'axes', rainBarsLayer, selectionLayer, 'areas', 'lines', 'points', 'slices', 'mesh', clickLayer],
        axisBottom: { tickRotation: -25, tickValues, format: value => String(value).split('|')[1] || value },
        theme: { text: { fill: colors.text, fontSize: 11 }, axis: { ticks: { line: { stroke: colors.grid }, text: { fill: colors.text } }, legend: { text: { fill: colors.text } } }, grid: { line: { stroke: colors.grid } }, tooltip: { container: { background: '#111827', color: colors.text } } }
      }));
      ensureHostAxisGradient('nivoHost', rows);
    }

    function safeRender(name, renderFn, rows) {
      try {
        renderFn(rows);
      } catch (error) {
        console.error(`[Chart Compare] ${name} failed`, error);
        const host = document.getElementById(name);
        if (host) host.innerHTML = '<div class="error">This engine could not render. Check the browser console for CDN or module details.</div>';
      }
    }

    const payload = readDataset();
    if (!payload || !Array.isArray(payload.hourly) || payload.hourly.length === 0) {
      showEmpty();
    } else {
      fullRows = prepareRows(payload);
      currentRangeHours = Math.min(24, fullRows.length);
      await renderAll(payload, sliceRows(currentRangeHours));
    }
  </script>
</body>
</html>
