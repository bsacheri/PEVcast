<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#1a1a2e" rx="45"/>
  
  <!-- Cloud shape -->
  <g transform="translate(96, 70)">
    <circle cx="-20" cy="0" r="24" fill="#e8f1f5"/>
    <circle cx="0" cy="-8" r="28" fill="#e8f1f5"/>
    <circle cx="20" cy="0" r="24" fill="#e8f1f5"/>
    <rect x="-45" y="8" width="90" height="20" fill="#e8f1f5"/>
  </g>
  
  <!-- Lightning bolt (electric theme for PEV) -->
  <g transform="translate(96, 100)">
    <path d="M 0,-20 L -8,-5 L -2,-5 L 6,15 L -2,15 L -10,35 L 10,-20 Z" fill="#ffb81c" stroke="#ff9d00" stroke-width="1"/>
  </g>
  
  <!-- Text label -->
  <text x="96" y="155" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ffffff">PEVcast</text>
</svg>